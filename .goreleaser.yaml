version: 2

project_name: ssh-inspect
force_token: github

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c 'go run . completion bash > completions/ssh-inspect.bash'
    - sh -c 'go run . completion zsh > completions/ssh-inspect.zsh'
    - sh -c 'go run . completion fish > completions/ssh-inspect.fish'

builds:
  # Linux builds - CGO disabled for static linking
  - id: linux
    binary: ssh-inspect
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ssh-inspect/cmd.Version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  # macOS builds - separate per arch for code signing and notarization
  - id: darwin-amd64
    binary: ssh-inspect
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ssh-inspect/cmd.Version={{.Version}}
    goos:
      - darwin
    goarch:
      - amd64
    hooks:
      post:
        - sh -c 'if [ -n "$CODESIGN_IDENTITY" ]; then codesign --sign "$CODESIGN_IDENTITY" --options runtime --entitlements entitlements.plist --timestamp --force --verbose "{{ .Path }}"; else echo "Skipping code signing (CODESIGN_IDENTITY not set)"; fi'
        - sh -c 'if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then echo "Notarizing {{ .Path }}..."; ditto -c -k --keepParent "{{ .Path }}" "{{ .Path }}.zip" && xcrun notarytool submit "{{ .Path }}.zip" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait && rm "{{ .Path }}.zip" && echo "Notarization complete (stapling skipped for standalone binary)"; else echo "Skipping notarization (credentials not set)"; fi'

  - id: darwin-arm64
    binary: ssh-inspect
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ssh-inspect/cmd.Version={{.Version}}
    goos:
      - darwin
    goarch:
      - arm64
    hooks:
      post:
        - sh -c 'if [ -n "$CODESIGN_IDENTITY" ]; then codesign --sign "$CODESIGN_IDENTITY" --options runtime --entitlements entitlements.plist --timestamp --force --verbose "{{ .Path }}"; else echo "Skipping code signing (CODESIGN_IDENTITY not set)"; fi'
        - sh -c 'if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then echo "Notarizing {{ .Path }}..."; ditto -c -k --keepParent "{{ .Path }}" "{{ .Path }}.zip" && xcrun notarytool submit "{{ .Path }}.zip" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait && rm "{{ .Path }}.zip" && echo "Notarization complete (stapling skipped for standalone binary)"; else echo "Skipping notarization (credentials not set)"; fi'

homebrew_casks:
  - repository:
      owner: davidolrik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/davidolrik/ssh-inspect
    description: Show SSH configuration for a hostname
    binaries:
      - ssh-inspect
    completions:
      bash: completions/ssh-inspect.bash
      zsh: completions/ssh-inspect.zsh
      fish: completions/ssh-inspect.fish

archives:
  - formats: [tar.gz]
    files:
      - src: "./completions/*"
        dst: completions
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    # Commit messages matching the regexp listed here will be removed from
    # the changelog
    #
    # Matches are performed against the first line of the commit message only,
    # prefixed with the commit SHA1, usually in the form of
    # `<abbrev-commit>[:] <title-commit>`.
    exclude:
      - "^chore:"
      - typo
      - spelling
      - whitespace
  groups:
    - title: "Security updates"
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: "Bug fixes"
      regexp: '^.*?(fix|refactor)(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: Dependency updates
      regexp: '^.*?(feat|fix|chore)\(deps\)!?:.+$'
      order: 300
    - title: "Documentation updates"
      regexp: ^.*?docs?(\([[:word:]]+\))??!?:.+$
      order: 400
    - title: "Test updates"
      regexp: ^.*?test?(\([[:word:]]+\))??!?:.+$
      order: 500
    - title: "Build process updates"
      regexp: ^.*?(build|ci)(\([[:word:]]+\))??!?:.+$
      order: 600
    - title: Miscellaneous
      order: 9999

release:
  github:
    owner: davidolrik
    name: ssh-inspect
